<div id="scan-modal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 hidden animate-fade-in">
    <div class="bg-white w-full max-w-sm rounded-2xl shadow-xl overflow-hidden transform transition-all p-5 space-y-4">
        <div class="text-center">
            <div class="w-12 h-12 bg-brand-orange/10 text-brand-orange rounded-full flex items-center justify-center mx-auto mb-2 text-xl">
                <i class="fa-solid fa-user-check"></i>
            </div>
            <h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider">Validación de Escaneo</h3>
            <p id="modal-user-name" class="text-xl font-bold text-gray-900 mt-1"></p>
            <p id="modal-timestamp" class="text-xs text-gray-400 mt-0.5"></p>
        </div>

        <div class="flex gap-2.5 pt-2">
            <button id="btn-modal-reject" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 text-xs font-bold py-3 rounded-xl transition-colors">
                Rechazar
            </button>
            <button id="btn-modal-confirm" class="flex-1 bg-brand-green hover:bg-brand-green/90 text-white text-xs font-bold py-3 rounded-xl transition-colors shadow-sm">
                Validar Asistencia
            </button>
        </div>
    </div>
</div>
