<section id="tab-individual" class="tab-content space-y-4">
    <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 space-y-4">
        <div>
            <h2 class="text-xs font-bold uppercase text-gray-400 tracking-wider mb-2">Consulta de Estado Individual</h2>
            <p class="text-[11px] text-gray-400">Selecciona tu nombre para auditar tus inasistencias y cobros.</p>
        </div>

        <select id="user-audit-select" class="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 text-sm focus:outline-none focus:border-brand-green">
            <option value="">-- Seleccionar Asistente --</option>
        </select>

        <div id="audit-card" class="hidden space-y-3 pt-2">
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-gray-50 p-3 rounded-xl border border-gray-100">
                    <span class="text-[10px] uppercase font-bold text-gray-400 block">Total Faltas</span>
                    <span id="audit-faltas" class="text-xl font-black text-gray-800">0</span>
                </div>
                <div class="bg-red-50 p-3 rounded-xl border border-red-100">
                    <span class="text-[10px] uppercase font-bold text-brand-red block">Saldo Neto</span>
                    <span id="audit-deuda" class="text-xl font-black text-brand-red">$0 COP</span>
                </div>
            </div>

            <div>
                <span class="text-[10px] uppercase font-bold text-gray-400 tracking-wider block mb-2">Historial de Fechas Perdidas</span>
                <div id="audit-dates-list" class="max-h-40 overflow-y-auto space-y-1.5 pr-1"></div>
            </div>
        </div>
    </div>
</section>
