<section id="tab-scan" class="tab-content active space-y-4">
    <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 text-center">
        <h2 class="text-xs font-bold uppercase text-gray-400 tracking-wider mb-4">Escanear Código del Asistente</h2>

        <div id="reader" class="w-full h-64 bg-gray-50 rounded-2xl overflow-hidden flex items-center justify-center border-2 border-dashed border-gray-200 relative mb-4">
            <span class="text-gray-400 text-xs p-4">Cámara inactiva</span>
        </div>

        <button id="btn-start-scan" class="w-full bg-brand-green text-white font-semibold py-3.5 rounded-xl shadow-sm active:scale-[0.98] transition-transform flex items-center justify-center gap-2 text-sm">
            <i class="fa-solid fa-camera"></i> Encender Cámara
        </button>
    </div>

    <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
        <label class="text-[11px] font-bold text-gray-400 uppercase tracking-wider">Simular Lectura QR Manual</label>
        <div class="flex gap-2 mt-2">
            <select id="sim-select" class="w-2/3 bg-gray-50 border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-brand-green"></select>
            <button id="btn-sim-scan" class="bg-gray-100 text-gray-700 px-4 rounded-xl text-xs font-bold active:bg-gray-200">Escanear</button>
        </div>
    </div>

    <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
        <h3 class="text-xs font-bold uppercase text-gray-400 tracking-wider mb-3">Validados Hoy</h3>
        <ul id="confirmed-list" class="divide-y divide-gray-50 text-sm"></ul>
    </div>
</section>
