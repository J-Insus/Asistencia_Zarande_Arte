<section id="tab-reports" class="tab-content space-y-4">
    <div class="flex justify-between items-center">
        <h2 class="text-xs font-bold uppercase text-gray-400 tracking-wider">Reporte General de Deudas</h2>
        <button id="btn-export-pdf" class="bg-brand-red text-white text-xs font-bold px-3 py-2 rounded-xl flex items-center gap-1.5 shadow-sm active:scale-95 transition-transform">
            <i class="fa-solid fa-file-pdf"></i> Exportar PDF
        </button>
    </div>

    <div id="pdf-content" class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 space-y-4">
        <div class="border-b border-gray-100 pb-3">
            <h3 class="font-bold text-gray-900 text-base">Estado de Faltas y Saldos</h3>
            <p class="text-[10px] text-gray-400">Generado el: <span id="report-timestamp"></span></p>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-left text-xs text-gray-600">
                <thead>
                    <tr class="bg-gray-50 text-gray-500 uppercase tracking-wider text-[10px] border-b border-gray-100">
                        <th class="py-2 px-2">Nombre</th>
                        <th class="py-2 px-2 text-center">Faltas</th>
                        <th class="py-2 px-2 text-right">Saldo Pendiente</th>
                    </tr>
                </thead>
                <tbody id="reports-table-body" class="divide-y divide-gray-100"></tbody>
            </table>
        </div>
    </div>
</section>
